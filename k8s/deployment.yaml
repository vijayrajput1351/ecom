---
#mongodb-deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: ecom
  name: mongo
spec:
  selector:
    matchLabels:
      app: mongo
  template:
    metadata:
      labels:
        app: mongo
    spec:
      containers:
      - name: mongo
        image: mongo:6
        resources:
          limits:
            memory: "128Mi"
            cpu: "500m"
        ports:
        - containerPort: 27017


---
#mongo-service
apiVersion: v1
kind: Service
metadata:
  name: mongo-service
  namespace: ecom
spec:
  selector:
    app: mongo
  ports:
  - protocol: TCP
    port: 27017
    targetPort: 27017

---
#configmap
apiVersion: v1
kind: ConfigMap
metadata:
  namespace: ecom
  name: config
data:
  USER_SERVICE_URL: "http://user-service:3001"
  PRODUCT_SERVICE_URL: "http://product-service:3002"
  ORDER_SERVICE_URL: "http://order-service:3003"
  PAYMENT_SERVICE_URL: "http://payment-service:3004"

  USER_MONGO_URI: "mongodb://admin:mypassword@mongo-service:27017/userdb?authSource=admin"
  PRODUCT_MONGO_URI: "mongodb://admin:mypassword@mongo-service:27017/productdb?authSource=admin"
  ORDER_MONGO_URI: "mongodb://admin:mypassword@mongo-service:27017/orderdb?authSource=admin"
  PAYMENT_MONGO_URI: "mongodb://admin:mypassword@mongo-service:27017/paymentdb?authSource=admin"


---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  namespace: ecom
  name: frontend-myingress
  labels:
    app.kubernetes.io/name: myingress
spec:
  rules:
  - host: vijay.com
    http:
      paths:
      - pathType: Prefix
        path: "/"
        backend:
          service:
            name: frontend-service
            port: 
              number: 80


---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  namespace: ecom
  name: hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: frontend-deployment
  minReplicas: 1
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 60















