apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: ecom
  name: frontend-deployment
spec:
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: vijay1304/frontend-h:latest
        resources:
          limits:
            memory: "128Mi"
            cpu: "500m"
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"
---
#frontend-service
apiVersion: v1
kind: Service
metadata:
  namespace: ecom
  name: frontend-service
spec:
  selector:
    app: frontend
  ports:
  - port: 80
    targetPort: 80

---
#api gatway deploymnet
apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: ecom
  name: api-deployment
spec:
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
      - name: api
        image: vijay1304/api-h:latest
        env:
        - name: USER_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: config
              key: USER_SERVICE_URL
        - name: PRODUCT_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: config
              key: PRODUCT_SERVICE_URL
        - name: ORDER_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: config
              key: ORDER_SERVICE_URL
        - name: PAYMENT_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: config
              key: PAYMENT_SERVICE_URL
        resources:
          limits:
            memory: "128Mi"
            cpu: "500m"
        ports:
        - containerPort: 4000

---
#api-service
apiVersion: v1
kind: Service
metadata:
  namespace: ecom
  name: api-gateway-service
spec:
  selector:
    app: api
  ports:
  - port: 4000
    targetPort: 4000

